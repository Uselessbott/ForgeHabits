syntax = "proto3";

option java_package = "com.forgehabits.app";
option java_multiple_files = true;

message MonkModeState {
  bool is_active = 1;
  int64 started_at = 2;
  string session_date = 3;
  repeated ActiveHabit habits = 4;
}

message ActiveHabit {
  string id = 1;
  string name = 2;
  bool completed = 3;
}
