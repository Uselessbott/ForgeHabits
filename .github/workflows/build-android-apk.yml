name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.3.13750724"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: artifacts/mobile

      - name: Expo prebuild
        run: pnpm expo prebuild --platform android --clean
        working-directory: artifacts/mobile

      - name: Disable Hermes and limit ABI
        run: |
          echo "hermesEnabled=false" >> android/gradle.properties
          echo "reactNativeArchitectures=arm64-v8a" >> android/gradle.properties
          sed -i 's/ndk.version=27.1.12297006/ndk.version=27.3.13750724/' android/local.properties 2>/dev/null || true
        working-directory: artifacts/mobile

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: artifacts/mobile/android

      - name: Find APK
        run: find /home/runner/work -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forgehabits-release
          path: /home/runner/work/ForgeHabits/ForgeHabits/artifacts/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
