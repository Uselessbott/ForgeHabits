name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: artifacts/mobile

      - name: Expo prebuild
        run: pnpm expo prebuild --platform android --clean
        working-directory: artifacts/mobile

      - name: Disable Hermes
        run: echo "hermesEnabled=false" >> android/gradle.properties
        working-directory: artifacts/mobile

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: artifacts/mobile/android

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null
        working-directory: artifacts/mobile/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forgehabits-release
          path: artifacts/mobile/android/app/build/outputs/apk/**/*.apk