name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;27.1.12297006"
          sdkmanager "cmake;3.31.5"

      - name: Install dependencies
        working-directory: artifacts/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Patch Worklets CMake
        run: |
          find /home/runner/work -path "*/react-native-worklets*/android/build.gradle" 2>/dev/null | while read f; do
            echo "Patching: $f"
            sed -i 's/version "3\.22\.1"/version "3.31.5"/g' "$f"
            sed -i 's/3\.22\.1/3.31.5/g' "$f"
          done

      - name: Expo Prebuild
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform android --clean

      - name: Limit ABI
        working-directory: artifacts/mobile
        run: |
          echo "reactNativeArchitectures=arm64-v8a" >> android/gradle.properties

      - name: Build APK
        working-directory: artifacts/mobile/android
        env:
          JS_RUNTIME: hermes
        run: ./gradlew assembleRelease --no-daemon

      - name: Find APK
        run: |
          find /home/runner/work -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForgeHabits
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
