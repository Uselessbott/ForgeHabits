name: Build Android APK

on:
  push:
    branches: [main, backup-before-reset]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug workflow
        run: |
          git rev-parse HEAD
          grep -n "Install NDK\|sdkmanager" .github/workflows/*.yml || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Expo Prebuild
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform android

      - name: Debug MonkMode files
        working-directory: artifacts/mobile
        run: |
          echo "===== MonkMode ====="
          find android/app/src/main/java -name "MonkMode*"
          grep -R "MonkModePackage" android/app/src/main/java -n

      - name: Debug gradle.properties
        working-directory: artifacts/mobile
        run: |
          echo "===== gradle.properties ====="
          cat android/gradle.properties



      - name: Limit ABI
        working-directory: artifacts/mobile
        run: |
          echo "reactNativeArchitectures=arm64-v8a" >> android/gradle.properties


      - name: Debug HabitsContext
        working-directory: artifacts/mobile
        run: |
          echo "===== COMMIT ====="
          git rev-parse HEAD
          echo "===== requestWidgetUpdate ====="
          grep -n "requestWidgetUpdate" context/HabitsContext.tsx
          echo "===== IMPORT BLOCK ====="
          sed -n '1,30p' context/HabitsContext.tsx


      - name: Show protobuf dependencies
        working-directory: artifacts/mobile/android
        run: |
          ./gradlew :app:dependencies --configuration releaseCompileClasspath > deps.txt
          grep -i protobuf deps.txt || true

      - name: Show protobuf deps
        working-directory: artifacts/mobile/android
        run: |
          ./gradlew :app:dependencies --configuration releaseCompileClasspath | grep -i protobuf || true


      - name: Show generated proto
        working-directory: artifacts/mobile/android
        run: |
          sed -n '1,40p' app/build/generated/source/proto/release/java/com/forgehabits/app/MonkModeState.java || true


      - name: Find generated proto
        working-directory: artifacts/mobile/android
        run: |
          find app/build -type f | grep -E "MonkModeState|ActiveHabit|proto" || true

      - name: Build APK
        working-directory: artifacts/mobile/android
        continue-on-error: true
        env:
          JS_RUNTIME: hermes
        run: ./gradlew assembleRelease --stacktrace --info --no-daemon

      - name: Show generated files
        working-directory: artifacts/mobile/android
        run: |
          find app/build -type f | grep -E "MonkModeState|ActiveHabit|proto" || true
          find app/build/generated -type f || true

      - name: Find APK
        run: |
          find /home/runner/work -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForgeHabits
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
