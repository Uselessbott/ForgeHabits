name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Install dependencies
        working-directory: artifacts/mobile
        run: pnpm install

      - name: Expo prebuild
        working-directory: artifacts/mobile
        run: pnpm expo prebuild --platform android --clean

      - name: Build APK
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forgehabits-release
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
