name: Build Android APK

on:
  push:
    branches: [main, backup-before-reset]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo Prebuild
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform android --clean

      - name: Build APK
        id: build
        working-directory: artifacts/mobile/android
        continue-on-error: true
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee build.log
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Show errors only
        if: always()
        run: |
          echo "========================================"
          echo "❌ ERROR SUMMARY"
          echo "========================================"
          if [ -f artifacts/mobile/android/build.log ]; then
            grep -E "(error|Error|ERROR|FAILED|failed|FAILURE|Exception|Caused by|What went wrong)" artifacts/mobile/android/build.log | head -30 || echo "No errors found"
          fi
          echo "========================================"
          echo "Status: ${{ steps.build.outputs.success }}"

      - name: Upload APK
        if: steps.build.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ForgeHabits
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk

      - name: Upload build log on failure
        if: steps.build.outputs.success == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: artifacts/mobile/android/build.log
